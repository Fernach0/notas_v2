<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo redondeado indigo -->
  <rect width="64" height="64" rx="12" fill="#4f46e5"/>
  <!-- Libro izquierdo (páginas) -->
  <rect x="10" y="14" width="19" height="36" rx="3" fill="#fff" opacity="0.95"/>
  <!-- Líneas de texto izquierdo -->
  <line x1="14" y1="22" x2="25" y2="22" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="27" x2="25" y2="27" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="25" y2="32" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="37" x2="22" y2="37" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <!-- Libro derecho (páginas) -->
  <rect x="35" y="14" width="19" height="36" rx="3" fill="#fff" opacity="0.95"/>
  <!-- Líneas de texto derecho -->
  <line x1="39" y1="22" x2="50" y2="22" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="27" x2="50" y2="27" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="32" x2="50" y2="32" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="37" x2="47" y2="37" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <!-- Lomo central -->
  <rect x="29" y="12" width="6" height="40" rx="1" fill="#c7d2fe"/>
</svg>
